learn_ir_button:
  name: 学习红外按键
  description: 让控客设备学习一个红外遥控按键，成功后自动创建可点击的按钮实体。
  fields:
    entity_id:
      name: 红外遥控实体
      description: 选择要学习按键的红外遥控实体。
      required: true
      selector:
        entity:
          domain: remote
    name:
      name: 按键名称
      description: 例如电视电源、音量+、空调制冷。
      required: true
      selector:
        text: {}
    timeout:
      name: 学习超时时间
      description: 执行动作后，需要在这个时间内按下实体遥控器上的目标按键。
      required: false
      default: 10
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: 秒
learn_rf_button:
  name: 学习射频按键
  description: 让控客设备学习一个射频遥控按键，成功后自动创建可点击的按钮实体。
  fields:
    entity_id:
      name: 射频遥控实体
      description: 选择要学习按键的射频遥控实体。
      required: true
      selector:
        entity:
          domain: remote
    name:
      name: 按键名称
      description: 例如窗帘打开、窗帘关闭、投影幕升起。
      required: true
      selector:
        text: {}
    timeout:
      name: 学习超时时间
      description: 执行动作后，需要在这个时间内按下实体遥控器上的目标按键。
      required: false
      default: 10
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: 秒
clear_ir_group:
  name: 清空红外按键组
  description: 清空所选控客设备指定红外组中的所有已学习按键，并移除 Home Assistant 中该组保存的红外按钮实体。
  fields:
    entity_id:
      name: 红外遥控实体
      description: 选择要清空红外按键组的红外遥控实体。
      required: true
      selector:
        entity:
          domain: remote
    group:
      name: 红外组
      description: 输入要清空的红外组。hakongke 新学习的按键默认使用 pykongke。
      required: true
      selector:
        text: {}
delete_ir_button:
  name: 删除红外按钮
  description: 删除一个已学习红外按钮，同时删除控客设备中对应 group 和 slot 的红外按键。
  fields:
    entity_id:
      name: 红外按钮实体
      description: 选择要删除的红外按钮实体。
      required: true
      selector:
        entity:
          domain: button
